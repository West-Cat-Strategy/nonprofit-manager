services:
  plausible_db:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: plausible_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - plausible-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plausible_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  plausible_events_db:
    image: clickhouse/clickhouse-server:23.3.7.5-alpine
    restart: unless-stopped
    expose:
      - "8123"
      - "9000"
    volumes:
      - plausible-clickhouse-data:/var/lib/clickhouse
      - ./plausible/clickhouse/clickhouse-config.xml:/etc/clickhouse-server/config.d/local.xml:ro
      - ./plausible/clickhouse/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/local.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    image: plausible/analytics:latest
    restart: unless-stopped
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_started
    env_file:
      - .env.plausible
    environment:
      BASE_URL: ${PLAUSIBLE_BASE_URL:-localhost:8000}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE:-replace-me}
      TOTP_VAULT_KEY: ${PLAUSIBLE_TOTP_VAULT_KEY:-replace-me}
      DATABASE_URL: postgres://postgres:${PLAUSIBLE_DB_PASSWORD:-postgres}@plausible_db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
      DISABLE_REGISTRATION: ${PLAUSIBLE_DISABLE_REGISTRATION:-false}
      MAILER_EMAIL: ${PLAUSIBLE_MAILER_EMAIL:-}
      SMTP_HOST_ADDR: ${PLAUSIBLE_SMTP_HOST:-}
      SMTP_HOST_PORT: ${PLAUSIBLE_SMTP_PORT:-587}
      SMTP_USER_NAME: ${PLAUSIBLE_SMTP_USER:-}
      SMTP_USER_PWD: ${PLAUSIBLE_SMTP_PASSWORD:-}
      SMTP_HOST_SSL_ENABLED: ${PLAUSIBLE_SMTP_SSL:-false}
    ports:
      - "8000:8000"

volumes:
  plausible-postgres-data:
  plausible-clickhouse-data:
