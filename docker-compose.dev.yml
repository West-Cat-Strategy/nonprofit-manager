name: ${COMPOSE_PROJECT_NAME:-nonprofit-dev}

x-backend-dev-env: &backend-dev-env
  NODE_ENV: ${DEV_NODE_ENV:-development}
  HOST: 0.0.0.0
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: nonprofit_manager
  DB_USER: nonprofit_app_user
  DB_PASSWORD: nonprofit_app_password
  BYPASS_REGISTRATION_POLICY_IN_TEST: ${DEV_BYPASS_REGISTRATION_POLICY_IN_TEST:-false}
  BYPASS_MFA_FOR_TESTS: ${DEV_BYPASS_MFA_FOR_TESTS:-false}
  # Keep Mailchimp opt-in for Docker dev/review stacks. The checked-in `.env.development`
  # placeholders are intentionally non-functional and can otherwise make review lanes look
  # "configured" before failing live status probes.
  MAILCHIMP_API_KEY: ${DEV_MAILCHIMP_API_KEY:-}
  MAILCHIMP_SERVER_PREFIX: ${DEV_MAILCHIMP_SERVER_PREFIX:-}
  API_ORIGIN: ${DEV_API_ORIGIN:-http://localhost:${DEV_BACKEND_PORT:-8004}}
  SITE_BASE_URL: ${DEV_SITE_BASE_URL:-http://sites.localhost}

x-workspace-build-contexts: &workspace-build-contexts
  workspace: .

x-backend-dev-build: &backend-dev-build
  context: ./backend
  target: dev
  additional_contexts: *workspace-build-contexts

x-dev-ready-healthcheck: &dev-ready-healthcheck
  interval: 10s
  timeout: 5s
  retries: 20
  start_period: 20s

x-backend-dev-depends-on: &backend-dev-depends-on
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

x-backend-dev-service: &backend-dev-service
  image: ${DEV_BACKEND_DOCKER_IMAGE:-nonprofit-dev-backend-dev:latest}
  restart: unless-stopped
  init: true
  env_file:
    - ${DEV_ENV_FILE:-.env.development}
  depends_on: *backend-dev-depends-on

services:
  postgres:
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    restart: unless-stopped
    ports:
      - "${DEV_DB_PORT:-8002}:5432"
    environment:
      POSTGRES_DB: nonprofit_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - nonprofit-manager-postgres-data:/var/lib/postgresql
      - ./database/initdb/000_init.sql:/docker-entrypoint-initdb.d/000_init.sql:ro
      - ./database/migrations:/migrations:ro
      - ./database/seeds:/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nonprofit_manager"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:8-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    restart: unless-stopped
    ports:
      - "${DEV_REDIS_PORT:-8003}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend-dev:
    <<: *backend-dev-service
    build: *backend-dev-build
    environment:
      <<: *backend-dev-env
      CORS_ORIGIN: http://localhost:5173,http://localhost:${DEV_FRONTEND_PORT:-8005},http://127.0.0.1:5173,http://127.0.0.1:${DEV_FRONTEND_PORT:-8005}
    command: npm run dev
    ports:
      - "${DEV_BACKEND_PORT:-8004}:3000"
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
      - backend-dev-node-modules:/app/node_modules
    healthcheck:
      <<: *dev-ready-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health/ready > /dev/null"]

  public-site-dev:
    <<: *backend-dev-service
    environment:
      <<: *backend-dev-env
      PORT: 8006
      API_ORIGIN: ${PUBLIC_SITE_API_ORIGIN:-http://sites.localhost}
      CORS_ORIGIN: http://sites.localhost,http://localhost:${DEV_PUBLIC_SITE_PORT:-8006},http://127.0.0.1:${DEV_PUBLIC_SITE_PORT:-8006}
    command: npm run dev:public
    ports:
      - "${DEV_PUBLIC_SITE_PORT:-8006}:8006"
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
      - public-site-dev-node-modules:/app/node_modules
    healthcheck:
      <<: *dev-ready-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8006/health/ready > /dev/null"]

  frontend-dev:
    image: ${DEV_FRONTEND_DOCKER_IMAGE:-nonprofit-dev-frontend-dev:latest}
    build:
      context: ./frontend
      target: dev
      additional_contexts: *workspace-build-contexts
    restart: unless-stopped
    init: true
    environment:
      VITE_API_URL: /api
      VITE_TEAM_CHAT_ENABLED: "true"
      VITE_TEAM_CHAT_REALTIME_ENABLED: "true"
    ports:
      - "${DEV_FRONTEND_PORT:-8005}:8005"
    volumes:
      - ./frontend:/app
      - frontend-dev-node-modules:/app/node_modules
    healthcheck:
      <<: *dev-ready-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8005 > /dev/null"]

  worker-dev:
    <<: *backend-dev-service
    build: *backend-dev-build
    environment:
      <<: *backend-dev-env
    command: npm run worker:dev
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
      - worker-dev-node-modules:/app/node_modules

volumes:
  nonprofit-manager-postgres-data:
  backend-uploads:
  backend-dev-node-modules:
  public-site-dev-node-modules:
  frontend-dev-node-modules:
  worker-dev-node-modules:
