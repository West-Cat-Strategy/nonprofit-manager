name: nonprofit-dev

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    ports:
      - "8002:5432"
    environment:
      POSTGRES_DB: nonprofit_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - nonprofit-manager-postgres-data:/var/lib/postgresql/data
      - ./database/initdb/000_init.sql:/docker-entrypoint-initdb.d/000_init.sql:ro
      - ./database/migrations:/migrations:ro
      - ./database/seeds:/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nonprofit_manager"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "8003:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend-dev:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    init: true
    env_file:
      - .env.development
    environment:
      NODE_ENV: test
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: nonprofit_manager
      DB_USER: postgres
      DB_PASSWORD: postgres
      BYPASS_REGISTRATION_POLICY_IN_TEST: "true"
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX_REQUESTS: "100000"
      AUTH_RATE_LIMIT_WINDOW_MS: "900000"
      AUTH_RATE_LIMIT_MAX_REQUESTS: "100000"
      REGISTRATION_MAX_ATTEMPTS: "100000"
      MAX_LOGIN_ATTEMPTS: "1000"
      DISABLE_PII_MASKING_IN_TEST: "true"
      CORS_ORIGIN: http://localhost:5173,http://localhost:8005,http://127.0.0.1:5173,http://127.0.0.1:8005
    ports:
      - "8004:3000"
    volumes:
      - ./backend:/app
      - backend-dev-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health/live > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend-dev:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    init: true
    environment:
      VITE_API_URL: /api
      VITE_TEAM_CHAT_ENABLED: "true"
      VITE_TEAM_CHAT_REALTIME_ENABLED: "true"
    ports:
      - "8005:8005"
    volumes:
      - ./frontend:/app
      - frontend-dev-node-modules:/app/node_modules
    depends_on:
      backend-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8005 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  nonprofit-manager-postgres-data:
  backend-dev-node-modules:
  frontend-dev-node-modules:
