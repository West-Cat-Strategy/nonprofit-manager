services:
  caddy:
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    restart: unless-stopped
    # Use public resolvers so ACME lookups work even when the host's internal
    # DNS servers are not reachable from inside Docker.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CADDY_BACKEND_UPSTREAM: ${CADDY_BACKEND_UPSTREAM:-backend:8000}
      CADDY_FRONTEND_UPSTREAM: ${CADDY_FRONTEND_UPSTREAM:-frontend:8001}
      CADDY_PUBLIC_SITE_UPSTREAM: ${CADDY_PUBLIC_SITE_UPSTREAM:-public-site:8006}
      CADDY_PUBLIC_SITE_DOMAIN: ${CADDY_PUBLIC_SITE_DOMAIN:-sites.localhost}
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
