services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Use public resolvers so ACME lookups work even when the host's internal
    # DNS servers are not reachable from inside Docker.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CADDY_BACKEND_UPSTREAM: ${CADDY_BACKEND_UPSTREAM:-backend:8000}
      CADDY_FRONTEND_UPSTREAM: ${CADDY_FRONTEND_UPSTREAM:-frontend:8001}
      CADDY_DOMAIN: ${CADDY_DOMAIN:-example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
