# Overlay-only compose file.
# Use with docker-compose.dev.yml:
#   docker compose -f docker-compose.dev.yml -f docker-compose.caddy.yml up -d
# This file is not intended to run standalone.

services:
  caddy:
    image: nonprofit-caddy-local:latest
    container_name: nonprofit-caddy-dev
    restart: unless-stopped
    ports:
      - "8088:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - nonprofit-dev-network
    depends_on:
      - frontend-dev

volumes:
  caddy_data:
  caddy_config:
