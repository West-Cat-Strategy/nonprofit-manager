services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nonprofit_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in the runtime env file}
    expose:
      - "5432"
    ports:
      - "127.0.0.1:8012:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:?POSTGRES_DATA_DIR must point at the encrypted host mount}:/var/lib/postgresql/data
      - ./database/initdb/000_init.sql:/docker-entrypoint-initdb.d/000_init.sql:ro
      - ./database/migrations:/migrations:ro
      - ./database/seeds:/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nonprofit_manager"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_AT_REST_ENCRYPTION_MODE: luks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  public-site:
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_AT_REST_ENCRYPTION_MODE: luks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
