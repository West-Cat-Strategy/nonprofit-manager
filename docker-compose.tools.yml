# Overlay-only compose file.
# Use with docker-compose.dev.yml:
#   docker compose -f docker-compose.dev.yml -f docker-compose.tools.yml --profile tools up -d
# This file is not intended to run standalone.

services:
  # pgAdmin - Database Administration Tool
  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nonprofit-dev-network
    profiles:
      - tools

  # Redis Commander - Redis Web UI
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nonprofit-dev-network
    profiles:
      - tools

  # MailHog - Email Testing Tool
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025" # SMTP server
    networks:
      - nonprofit-dev-network
    profiles:
      - tools

volumes:
  pgadmin_data:
    driver: local
