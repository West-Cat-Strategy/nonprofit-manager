x-runtime-env: &runtime-env
  NODE_ENV: ${NODE_ENV:-production}
  HOST: 0.0.0.0
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME:-nonprofit_manager}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in the runtime env file}
  REDIS_URL: ${REDIS_URL:?Set REDIS_URL in the runtime env file}
  REDIS_ENABLED: ${REDIS_ENABLED:-true}
  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
  RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-1500}
  AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
  AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-75}
  REGISTRATION_MAX_ATTEMPTS: ${REGISTRATION_MAX_ATTEMPTS:-75}
  PUBLIC_EVENT_CHECKIN_RATE_LIMIT_WINDOW_MS: ${PUBLIC_EVENT_CHECKIN_RATE_LIMIT_WINDOW_MS:-600000}
  PUBLIC_EVENT_CHECKIN_RATE_LIMIT_MAX_REQUESTS: ${PUBLIC_EVENT_CHECKIN_RATE_LIMIT_MAX_REQUESTS:-300}
  MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
  ACCOUNT_LOCKOUT_DURATION_MS: ${ACCOUNT_LOCKOUT_DURATION_MS:-900000}
  DB_AT_REST_ENCRYPTION_MODE: ${DB_AT_REST_ENCRYPTION_MODE}
  DB_AT_REST_PROVIDER: ${DB_AT_REST_PROVIDER}
  DB_AT_REST_VERIFIED: ${DB_AT_REST_VERIFIED}
  DB_LUKS_MAPPING_NAME: ${DB_LUKS_MAPPING_NAME}
  POSTGRES_DATA_DIR: ${POSTGRES_DATA_DIR}
  BACKUP_DIR: ${BACKUP_DIR}

x-build-contexts: &build-contexts
  workspace: .

x-runtime-env-file: &runtime-env-file
  - ${RUNTIME_ENV_FILE:-.env.production}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ./backend
      target: production
      additional_contexts: *build-contexts
    restart: unless-stopped
    init: true
    env_file: *runtime-env-file
    expose:
      - "8000"
    environment:
      <<: *runtime-env
      PORT: ${BACKEND_PORT:-8000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8001,http://127.0.0.1:8001}
      API_ORIGIN: ${API_ORIGIN:-http://localhost:8000}
      SITE_BASE_URL: ${SITE_BASE_URL:-https://sites.example.org}
    command: ["node", "dist/index.js"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health/ready > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      target: production
      additional_contexts: *build-contexts
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    init: true
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  public-site:
    build:
      context: ./backend
      target: production
      additional_contexts: *build-contexts
    restart: unless-stopped
    init: true
    env_file: *runtime-env-file
    expose:
      - "8006"
    environment:
      <<: *runtime-env
      PORT: ${PUBLIC_SITE_PORT:-8006}
      CORS_ORIGIN: ${PUBLIC_SITE_CORS_ORIGIN:-https://sites.example.org}
      API_ORIGIN: ${PUBLIC_SITE_API_ORIGIN:-https://sites.example.org}
      SITE_BASE_URL: ${SITE_BASE_URL:-https://sites.example.org}
    command: ["node", "dist/public-site.js"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8006/health/ready > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
