name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security Scan / security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install pinned gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          curl --fail --location --show-error \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            --output checksums.txt
          curl --fail --location --show-error \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          CHECKSUM_LINE=$(grep -F "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" checksums.txt)
          if [ -z "$CHECKSUM_LINE" ]; then
            echo "ERROR: no checksum found for gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" >&2
            exit 1
          fi
          echo "$CHECKSUM_LINE" | sha256sum --check
          mkdir -p gitleaks
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -C gitleaks gitleaks
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

      - name: Run local security scan mirror
        run: make security-scan
