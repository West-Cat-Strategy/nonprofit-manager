services:
  opensearch:
    image: opensearchproject/opensearch:2.19.3@sha256:e96cc6ae1500a073d973c0906f30f7cf4d9c461f32f855f9242a2da933660cdd
    restart: unless-stopped
    init: true
    env_file:
      - ${OPENSEARCH_ENV_FILE:-.env.opensearch}
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:?Set OPENSEARCH_INITIAL_ADMIN_PASSWORD in .env.opensearch}
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:9201:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -k -fsS -u ${OPENSEARCH_USERNAME:-admin}:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD https://127.0.0.1:9200/_cluster/health?wait_for_status=yellow\\&timeout=1s > /dev/null",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  data-prepper:
    image: opensearchproject/data-prepper:2.11.0@sha256:45d644fe7ec1724866d22e8c5cb5ddca9f963a4c5ecff872048e93c45de001df
    restart: unless-stopped
    init: true
    env_file:
      - ${OPENSEARCH_ENV_FILE:-.env.opensearch}
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME:-admin}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:?Set OPENSEARCH_PASSWORD in .env.opensearch}
    volumes:
      - ./opensearch/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml:ro
      - ./opensearch/data-prepper-pipelines.yaml:/usr/share/data-prepper/pipelines/pipelines.yaml:ro
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8080:8080"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.3@sha256:19e0dd30c7086e933cf475726d92ccc98be26ced9f0c4e4a2a3ae6d9539280a3
    restart: unless-stopped
    init: true
    env_file:
      - ${OPENSEARCH_ENV_FILE:-.env.opensearch}
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME:-admin}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:?Set OPENSEARCH_PASSWORD in .env.opensearch}
      OPENSEARCH_SSL_VERIFICATIONMODE: none
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5602:5601"

volumes:
  opensearch-data:
