<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Nonprofit Manager - Organization Management Platform</title>
    <meta name="title" content="Nonprofit Manager - Organization Management Platform" />
    <meta name="description" content="All-in-one nonprofit management platform for managing constituents, volunteers, events, donations, and more." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nonprofit Manager - Organization Management Platform" />
    <meta property="og:description" content="All-in-one nonprofit management platform for managing constituents, volunteers, events, donations, and more." />
    <meta property="og:site_name" content="Nonprofit Manager" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Nonprofit Manager - Organization Management Platform" />
    <meta property="twitter:description" content="All-in-one nonprofit management platform for managing constituents, volunteers, events, donations, and more." />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <script>
      (function () {
        var legacyPathRedirects = {
          '/email-marketing': '/settings/communications',
          '/settings/admin': '/settings/admin/dashboard',
          '/settings/admin/email': '/settings/communications',
          '/settings/admin/portal': '/settings/admin/portal/access',
          '/settings/organization': '/settings/admin/organization',
          '/admin/audit-logs': '/settings/admin/audit_logs',
        };
        var pathname = window.location.pathname;
        var nextPath = legacyPathRedirects[pathname];

        if (!nextPath) {
          return;
        }

        window.history.replaceState(
          null,
          '',
          nextPath + window.location.search + window.location.hash
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
